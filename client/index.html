<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Broker — Stock Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>◈</text></svg>" />
  <link rel="stylesheet" href="style.css" />
  <!-- Socket.IO client from CDN -->
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
</head>
<body>

  <!-- ─── LOGIN SCREEN ─────────────────────────────────────────────────── -->
  <section id="login-screen" class="screen">
    <div class="login-card">
      <div class="login-logo">
        <span class="logo-mark">◈</span>
        <span class="logo-text">Broker</span>
      </div>
      <p class="login-tagline">Professional markets, at your pace.</p>

      <form id="login-form" autocomplete="off">
        <div class="field-group">
          <label for="email-input" class="field-label">Email address</label>
          <input
            id="email-input"
            type="email"
            class="field-input"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />
        </div>
        <button type="submit" class="btn-primary">
          <span>Continue to Dashboard</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </form>
    </div>
  </section>

  <!-- ─── DASHBOARD ────────────────────────────────────────────────────── -->
  <section id="dashboard-screen" class="screen hidden">

    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <span class="logo-mark">◈</span>
        <span class="logo-text">Broker</span>
      </div>
      <div class="header-right">
        <div class="status-indicator">
          <span class="status-dot" id="status-dot"></span>
          <span class="status-text" id="status-text">Connecting…</span>
        </div>
        <div class="user-pill" id="user-email-pill"></div>
        <button class="btn-logout" id="logout-btn" title="Sign out">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3M10 11l3-3-3-3M13 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="main">

      <!-- Welcome -->
      <div class="welcome-row">
        <div>
          <h1 class="welcome-heading">Good day, <span id="welcome-name"></span></h1>
          <p class="welcome-sub">Select the stocks you want to track in real time.</p>
        </div>
        <div class="market-badge">
          <span class="market-dot"></span>
          Markets open
        </div>
      </div>

      <!-- Subscription Panel -->
      <div class="panel subscription-panel">
        <div class="panel-header">
          <h2 class="panel-title">Available Stocks</h2>
          <p class="panel-subtitle">Choose one or more tickers to subscribe</p>
        </div>
        <div class="stock-checklist" id="stock-checklist">
          <!-- Populated by app.js -->
        </div>
        <div class="panel-footer">
          <button class="btn-subscribe" id="subscribe-btn">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <path d="M7.5 1v13M1 7.5h13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
            Subscribe
          </button>
          <span class="subscribe-hint" id="subscribe-hint"></span>
        </div>
      </div>

      <!-- Live Prices -->
      <div id="live-section" class="live-section hidden">
        <div class="section-header">
          <h2 class="section-title">Live Prices</h2>
          <span class="update-badge">
            <span class="pulse-ring"></span>
            Live · 1s interval
          </span>
        </div>
        <div class="stock-grid" id="stock-grid">
          <!-- Stock cards injected by app.js -->
        </div>
      </div>

    </main>
  </section>

  <script src="app.js"></script>
</body>
</html>
